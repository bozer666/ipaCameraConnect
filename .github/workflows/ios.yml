name: Build IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Export IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Generate Xcode project
        run: xcodegen

      - name: Build for Simulator
        run: |
          xcodebuild clean build \
            -project ipaCamera.xcodeproj \
            -scheme ipaCamera \
            -sdk iphonesimulator \
            -configuration Release \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=18.2' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --quiet

      - name: Package .app
        run: |
          mkdir -p ${{ runner.temp }}/ipaCamera
          find ~/Library/Developer/Xcode/DerivedData -name "ipaCamera.app" -path "*/Release-iphonesimulator/*" -exec cp -R {} ${{ runner.temp }}/ipaCamera/ \;
          cd ${{ runner.temp }}/ipaCamera
          zip -r ipaCamera-simulator.zip ipaCamera.app

      - name: Upload Simulator App
        uses: actions/upload-artifact@v4
        with:
          name: ipaCamera-simulator
          path: ${{ runner.temp }}/ipaCamera/ipaCamera-simulator.zip
          if-no-files-found: warn
