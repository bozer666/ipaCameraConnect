name: Build IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # 手动触发
  workflow_dispatch:

jobs:
  build:
    name: Build & Export IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Generate Xcode project
        run: xcodegen

      - name: Archive App
        run: |
          xcodebuild clean archive \
            -project ipaCamera.xcodeproj \
            -scheme ipaCamera \
            -configuration Release \
            -archivePath ${{ runner.temp }}/ipaCamera.xcarchive \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
            | xcbeautify --quiet

      - name: Create ExportOptions.plist
        run: |
          cat > ${{ runner.temp }}/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>${{ secrets.TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/ipaCamera.xcarchive \
            -exportPath ${{ runner.temp }}/ipaCamera \
            -exportOptionsPlist ${{ runner.temp }}/ExportOptions.plist \
            -allowProvisioningUpdates \
            | xcbeautify --quiet

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipaCamera.ipa
          path: ${{ runner.temp }}/ipaCamera/*.ipa
          if-no-files-found: error
