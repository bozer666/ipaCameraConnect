name: ipaCamera
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only
    INFOPLIST_FILE: ipaCamera/Info.plist
    DEVELOPMENT_TEAM: ""  # 由 workflow 传入

targets:
  ipaCamera:
    type: application
    platform: iOS
    sources:
      - path: ipaCamera
        includes:
          - "**/*.swift"
          - "**/*.plist"
          - "**/*.xcassets"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.ipaCamera
        INFOPLIST_FILE: ipaCamera/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: ipaCamera/Info.plist
